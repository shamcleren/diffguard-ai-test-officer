apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-mock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-mock
  template:
    metadata:
      labels:
        app: payment-mock
    spec:
      containers:
        - name: wiremock
          image: {{ .Values.paymentMock.image }}
          ports:
            - containerPort: {{ .Values.paymentMock.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: payment-mock
spec:
  selector:
    app: payment-mock
  ports:
    - port: 8080
      targetPort: {{ .Values.paymentMock.port }}
