name: diffguard-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  demo-workflow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run demo
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: diffguard-reports
          path: reports/
